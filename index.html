<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1217">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catan Trader">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Catan Trader</title>
<style>
  :root{
    --wood:#2fa85a;
    --brick:#e2562f;
    --sheep:#8ecb46;
    --wheat:#eaa61e;
    --ore:#6c7a8a;
    --wild:#7c5cff;
    --bg-bottom:#0e1116;
    --bg-top:#161c25;
    --hair:rgba(255,255,255,.09);
    --ctrl-bg:rgba(255,255,255,.06);
    --ctrl-border:rgba(255,255,255,.12);
    --ease:cubic-bezier(.34,1.56,.64,1);
    --card-w:68px;--card-h:92px;--card-fs:36px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg-bottom);
    color:#fff;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
    overscroll-behavior:none;
  }
  #app{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    height:100dvh;height:100vh;
  }

  /* ---- halves ---- */
  .half{
    flex:1 1 0;
    min-height:0;
    display:flex;
    position:relative;
    overflow:hidden;
  }
  .half.top{
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(124,92,255,.05), transparent 60%),
      var(--bg-top);
    padding-top:env(safe-area-inset-top);
  }
  .half.bottom{
    background:
      radial-gradient(120% 90% at 50% 100%, rgba(47,168,90,.045), transparent 60%),
      var(--bg-bottom);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .row{
    flex:1;
    display:flex;
    overflow-x:auto;overflow-y:hidden;
    width:100%;
    scrollbar-width:none;
  }
  .row::-webkit-scrollbar{display:none;}
  .inner{
    margin:auto;
    display:flex;
    align-items:center;
    gap:6px;
    padding:18px 22px;
    min-height:100%;
  }
  .inner.rot{transform:rotate(180deg);}

  /* ---- pile ---- */
  .pile{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-content:center;
    gap:9px;
    max-width:calc(var(--card-w) * 3 + 18px);
    padding:8px;
    border-radius:18px;
    transition:background .18s ease;
    cursor:pointer;
  }
  .pile:active{background:rgba(255,255,255,.05);}
  .sep{
    flex:none;
    width:2px;
    height:78px;
    margin:0 8px;
    border-radius:2px;
    background:linear-gradient(180deg,transparent,var(--hair) 18%,var(--hair) 82%,transparent);
  }

  /* ---- card ---- */
  .card{
    flex:none;
    width:var(--card-w);height:var(--card-h);
    border-radius:calc(var(--card-w) * .22);
    display:flex;align-items:center;justify-content:center;
    font-size:var(--card-fs);line-height:1;
    box-shadow:
      0 1px 0 rgba(255,255,255,.22) inset,
      0 0 0 1px rgba(255,255,255,.07) inset,
      0 8px 18px -8px rgba(0,0,0,.7);
    animation:pop .16s var(--ease) both;
  }
  .card .emoji{filter:drop-shadow(0 1px 1px rgba(0,0,0,.28));transform:translateY(-1px);}
  @keyframes pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

  /* ---- empty ghost ---- */
  .ghost{
    width:64px;height:64px;
    border-radius:18px;
    border:2px dashed rgba(255,255,255,.16);
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.22);
    animation:breathe 3.4s ease-in-out infinite;
  }
  .ghost svg{width:26px;height:26px;}
  @keyframes breathe{0%,100%{opacity:.55;}50%{opacity:1;}}

  /* ---- center divider ---- */
  .divider{
    flex:none;
    height:74px;
    position:relative;
    display:flex;align-items:center;justify-content:center;
    gap:18px;
    z-index:5;
  }
  .divider::before{
    content:"";
    position:absolute;left:0;right:0;top:50%;height:1px;
    background:linear-gradient(90deg,transparent,var(--hair) 20%,var(--hair) 80%,transparent);
  }
  .ctrl{
    position:relative;
    width:54px;height:54px;
    border-radius:50%;
    border:1px solid var(--ctrl-border);
    background:var(--ctrl-bg);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    cursor:pointer;
    transition:transform .16s var(--ease), background .18s ease;
    box-shadow:0 6px 20px -6px rgba(0,0,0,.6);
  }
  .ctrl:active{transform:scale(.88);background:rgba(255,255,255,.12);}
  .ctrl svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .ctrl.swap{
    width:60px;height:60px;
    background:rgba(255,255,255,.09);
  }
  .ctrl.swap svg{width:26px;height:26px;}
  .ctrl.swap.spin svg{animation:spin .4s var(--ease);}
  @keyframes spin{from{transform:rotate(0);}to{transform:rotate(180deg);}}

  /* ---- picker ---- */
  .backdrop{
    position:fixed;inset:0;
    z-index:50;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    background:rgba(6,8,11,.55);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    opacity:0;pointer-events:none;
    transition:opacity .24s ease;
  }
  .backdrop.open{opacity:1;pointer-events:auto;}
  .picker{
    width:100%;max-width:360px;
    background:rgba(28,33,41,.92);
    border:1px solid rgba(255,255,255,.1);
    border-radius:28px;
    padding:16px 16px 18px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.8);
    transform:translateY(28px) scale(.94);
    opacity:0;
    transition:transform .32s var(--ease), opacity .24s ease;
  }
  .backdrop.open .picker{transform:none;opacity:1;}
  .grab{
    width:42px;height:5px;border-radius:3px;
    background:rgba(255,255,255,.22);
    margin:0 auto 16px;
  }
  .tiles{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  .tile{
    position:relative;
    aspect-ratio:3/4;
    border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    font-size:42px;line-height:1;
    cursor:pointer;
    box-shadow:
      0 1px 0 rgba(255,255,255,.22) inset,
      0 0 0 1px rgba(255,255,255,.07) inset,
      0 10px 22px -10px rgba(0,0,0,.7);
    transition:transform .15s var(--ease), filter .18s ease;
    filter:saturate(.65) brightness(.78);
  }
  .tile:active{transform:scale(.93);}
  .tile.active{filter:none;}
  .tile .temoji{filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));}
  .badge{
    position:absolute;top:-7px;right:-7px;
    min-width:28px;height:28px;padding:0 7px;
    border-radius:14px;
    background:#fff;color:#15181d;
    font-size:16px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 10px -2px rgba(0,0,0,.5);
    animation:bump .18s var(--ease);
  }
  @keyframes bump{from{transform:scale(.4);}to{transform:scale(1);}}
  .minus{
    position:absolute;bottom:-7px;left:-7px;
    width:28px;height:28px;
    border-radius:50%;
    border:none;
    background:rgba(10,12,15,.9);
    color:#fff;font-size:22px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 10px -2px rgba(0,0,0,.5);
    transition:transform .15s var(--ease);
  }
  .minus:active{transform:scale(.85);}
</style>
</head>
<body>
<div id="app">
  <div class="half top" data-side="want">
    <div class="row"><div class="inner rot" id="wantInner"></div></div>
  </div>

  <div class="divider">
    <button class="ctrl swap" id="swapBtn" aria-label="swap">
      <svg viewBox="0 0 24 24"><path d="M8 19V5M8 5 4.5 9M8 5l3.5 4M16 5v14M16 19l3.5-4M16 19l-3.5-4"/></svg>
    </button>
    <button class="ctrl clear" id="clearBtn" aria-label="clear">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>
    </button>
  </div>

  <div class="half bottom" data-side="give">
    <div class="row"><div class="inner" id="giveInner"></div></div>
  </div>
</div>

<div class="backdrop" id="backdrop">
  <div class="picker" id="picker">
    <div class="grab"></div>
    <div class="tiles" id="tiles"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var RES = [
    {id:'wood',  emoji:'🌲', color:'var(--wood)'},
    {id:'brick', emoji:'🧱', color:'var(--brick)'},
    {id:'sheep', emoji:'🐑', color:'var(--sheep)'},
    {id:'wheat', emoji:'🌾', color:'var(--wheat)'},
    {id:'ore',   emoji:'🪨', color:'var(--ore)'},
    {id:'wild',  emoji:'❓', color:'var(--wild)'}
  ];
  var RMAP = {}; RES.forEach(function(r){RMAP[r.id]=r;});

  var PLUS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';

  var state = load() || { give:[], want:[] };
  var editing = null; // {side, index}

  var giveInner = document.getElementById('giveInner');
  var wantInner = document.getElementById('wantInner');
  var backdrop  = document.getElementById('backdrop');
  var tilesEl   = document.getElementById('tiles');

  /* ---------- persistence ---------- */
  function save(){ try{ localStorage.setItem('catan-trader', JSON.stringify(state)); }catch(e){} }
  function load(){ try{ var s=localStorage.getItem('catan-trader'); return s?JSON.parse(s):null; }catch(e){ return null; } }

  /* ---------- haptics ---------- */
  function buzz(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

  /* ---------- render ---------- */
  function cardEl(res){
    var c = document.createElement('div');
    c.className = 'card';
    c.style.background = res.color;
    c.innerHTML = '<span class="emoji">'+res.emoji+'</span>';
    return c;
  }

  function renderSide(side){
    var host = side==='give' ? giveInner : wantInner;
    host.innerHTML = '';
    var piles = state[side];
    if(!piles.length){
      var g = document.createElement('div');
      g.className = 'ghost';
      g.innerHTML = PLUS;
      host.appendChild(g);
      return;
    }
    piles.forEach(function(pile, i){
      if(i>0){
        var s = document.createElement('div');
        s.className = 'sep';
        host.appendChild(s);
      }
      var p = document.createElement('div');
      p.className = 'pile';
      p.dataset.side = side;
      p.dataset.index = i;
      RES.forEach(function(res){
        var n = pile[res.id]||0;
        for(var k=0;k<n;k++) p.appendChild(cardEl(res));
      });
      host.appendChild(p);
    });
  }

  function renderAll(){ applyScale(); renderSide('give'); renderSide('want'); }

  function sideLoad(side){
    var piles = state[side], cards = 0;
    piles.forEach(function(p){ for(var k in p) cards += p[k]; });
    return cards + (piles.length>1 ? (piles.length-1)*2 : 0);
  }
  function applyScale(){
    var load = Math.max(sideLoad('give'), sideLoad('want'));
    var w,h,fs;
    if(load<=3){ w=84; h=114; fs=46; }
    else if(load<=6){ w=70; h=95; fs=38; }
    else if(load<=10){ w=58; h=78; fs=31; }
    else if(load<=16){ w=49; h=67; fs=26; }
    else { w=43; h=59; fs=23; }
    var r = document.documentElement.style;
    r.setProperty('--card-w', w+'px');
    r.setProperty('--card-h', h+'px');
    r.setProperty('--card-fs', fs+'px');
  }

  /* ---------- picker ---------- */
  function renderPicker(){
    if(!editing) return;
    var pile = state[editing.side][editing.index] || {};
    tilesEl.innerHTML = '';
    RES.forEach(function(res){
      var n = pile[res.id]||0;
      var t = document.createElement('div');
      t.className = 'tile' + (n>0?' active':'');
      t.style.background = res.color;
      t.dataset.id = res.id;
      var inner = '<span class="temoji">'+res.emoji+'</span>';
      if(n>0){
        inner += '<span class="badge">'+n+'</span>';
        inner += '<button class="minus" data-minus="'+res.id+'" aria-label="minus">−</button>';
      }
      t.innerHTML = inner;
      tilesEl.appendChild(t);
    });
  }

  function openPicker(side, index){
    editing = {side:side, index:index};
    renderPicker();
    backdrop.classList.add('open');
    buzz(8);
  }

  function closePicker(){
    if(!editing) return;
    var pile = state[editing.side][editing.index];
    if(pile && Object.keys(pile).length===0){
      state[editing.side].splice(editing.index,1);
      renderSide(editing.side);
    }
    editing = null;
    backdrop.classList.remove('open');
    save();
  }

  tilesEl.addEventListener('click', function(e){
    if(!editing) return;
    var pile = state[editing.side][editing.index];
    var minus = e.target.closest('[data-minus]');
    if(minus){
      var mid = minus.dataset.minus;
      pile[mid] = (pile[mid]||0) - 1;
      if(pile[mid] <= 0) delete pile[mid];
      renderPicker(); renderSide(editing.side); save(); buzz(6);
      return;
    }
    var tile = e.target.closest('.tile');
    if(tile){
      var id = tile.dataset.id;
      pile[id] = (pile[id]||0) + 1;
      renderPicker(); renderSide(editing.side); save(); buzz(11);
    }
  });

  backdrop.addEventListener('click', function(e){
    if(e.target === backdrop) closePicker();
  });

  /* ---------- half taps ---------- */
  function bindHalf(sel, side){
    document.querySelector(sel).addEventListener('click', function(e){
      if(backdrop.classList.contains('open')) return;
      var pileEl = e.target.closest('.pile');
      if(pileEl){
        openPicker(pileEl.dataset.side, parseInt(pileEl.dataset.index,10));
        return;
      }
      // empty space -> new alternative pile
      state[side].push({});
      renderSide(side); save();
      openPicker(side, state[side].length - 1);
    });
  }
  bindHalf('.half.top', 'want');
  bindHalf('.half.bottom', 'give');

  /* ---------- controls ---------- */
  var swapBtn = document.getElementById('swapBtn');
  swapBtn.addEventListener('click', function(){
    var t = state.give; state.give = state.want; state.want = t;
    renderAll(); save(); buzz(14);
    swapBtn.classList.remove('spin'); void swapBtn.offsetWidth; swapBtn.classList.add('spin');
  });

  document.getElementById('clearBtn').addEventListener('click', function(){
    state = { give:[], want:[] };
    renderAll(); save(); buzz([12,40,12]);
  });

  /* ---------- wake lock ---------- */
  var wakeLock = null;
  function requestWake(){
    if(!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function(wl){
      wakeLock = wl;
      wl.addEventListener('release', function(){ wakeLock = null; });
    }).catch(function(){});
  }
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='visible' && wakeLock===null) requestWake();
  });
  requestWake();

  /* ---------- service worker (offline / add-to-home-screen) ---------- */
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }

  /* ---------- go ---------- */
  renderAll();
})();
</script>
</body>
</html>
